<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="CI pipeline overview">
  <rect width="920" height="220" fill="#0f172a"/>
  <text x="32" y="40" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Continuous Integration (GitHub Actions)</text>

  <rect x="40" y="80" width="140" height="70" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="110" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">git push</text>
  <text x="110" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">main / PR</text>

  <text x="195" y="120" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="22">→</text>

  <rect x="230" y="80" width="160" height="70" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="310" y="110" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">CI workflow</text>
  <text x="310" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">pip + pytest</text>

  <text x="405" y="120" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="22">→</text>

  <rect x="440" y="80" width="180" height="70" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="530" y="110" text-anchor="middle" fill="#34d399" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">77 tests green</text>
  <text x="530" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">HTML report built</text>

  <text x="635" y="120" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="22">→</text>

  <rect x="670" y="80" width="210" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="775" y="110" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Artifact upload</text>
  <text x="775" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">pytest-html-report</text>

  <text x="32" y="190" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Workflow: .github/workflows/ci.yml · Badge on README shows latest status</text>
</svg>
